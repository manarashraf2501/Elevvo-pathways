<body>

<form class="w-50 m-auto border border-primary rounded p-3 shadow">

<div id="namevali"> </div>

  <div class="mb-3">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script>
// email vaildation    
var val = document.getElementById('email');
var divv= document.getElementById('validation')
const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

val.addEventListener('blur', function(){
var email=val.value
if (email===''){
 divv.style.display='none'   
}
 else if (regex.test(email)) {
    divv.style.display = "none";
  } 
  else {
    divv.style.display = "block";
    divv.style.color='red';
   divv.innerHTML = "Please enter a valid email address.";
  }
});
// name validation
var fullName=document.getElementById('fullname');
var valiMessage= document.getElementById('namevali')
fullName.addEventListener('blur', function(){
 var nvalue= fullName.value; 
if(nvalue.length <6){
namevali.style.display='block'
namevali.innerHTML='name should not be less than 6 charcters';
}

});

var formStyle= document.getElementsByTagName('input')
Array.from (formStyle).forEach( input => {
  formStyle.stygle.background='transparent'  
});
</script>
